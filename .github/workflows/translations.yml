name: Translations

on:
  push:
    branches:
      - main
    paths:
      - 'locale/en.yml'

jobs:
  notify-weblate:
    name: Notify Weblate of source changes
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Weblate repository update
        env:
          WEBLATE_HOOK_URL: ${{ secrets.WEBLATE_HOOK_URL }}
        run: |
          if [ -n "$WEBLATE_HOOK_URL" ]; then
            curl -fsS "$WEBLATE_HOOK_URL"
          else
            echo "WEBLATE_HOOK_URL secret not set — skipping."
          fi
