name: Post release to Flarum support site

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Post reply to support discussion
        env:
          FLARUM_FORUM_URL: ${{ vars.FLARUM_FORUM_URL }}
          FLARUM_DISCUSSION_ID: ${{ vars.FLARUM_DISCUSSION_ID }}
          FLARUM_API_KEY: ${{ secrets.FLARUM_API_KEY }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          if [ -z "${FLARUM_FORUM_URL}" ] || [ -z "${FLARUM_DISCUSSION_ID}" ] || [ -z "${FLARUM_API_KEY}" ]; then
            echo "Missing FLARUM_FORUM_URL / FLARUM_DISCUSSION_ID / FLARUM_API_KEY — set repo variables and secret." >&2
            exit 1
          fi

          CONTENT=$(printf '## %s %s\n\n%s\n\n[View release on GitHub](%s)\n' \
            "$REPO_NAME" "$RELEASE_TAG" "${RELEASE_BODY:-_No release notes provided._}" "$RELEASE_URL")

          PAYLOAD=$(jq -n \
            --arg content "$CONTENT" \
            --arg did "$FLARUM_DISCUSSION_ID" \
            '{data:{type:"posts",attributes:{content:$content},relationships:{discussion:{data:{type:"discussions",id:$did}}}}}')

          HTTP_CODE=$(curl -sS -o /tmp/flarum-resp.json -w '%{http_code}' \
            -X POST "${FLARUM_FORUM_URL%/}/api/posts" \
            -H "Authorization: Token ${FLARUM_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Flarum responded with HTTP $HTTP_CODE"
          cat /tmp/flarum-resp.json
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            exit 1
          fi
